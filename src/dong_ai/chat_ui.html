<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dong AI Company</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: #f8f8fa;
    border-bottom: 1px solid #e8e8ec;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .header h1 { font-size: 16px; font-weight: 600; color: #333; }
  .header .model { font-size: 12px; color: #999; margin-left: auto; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .message {
    max-width: 720px;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .message.user {
    background: #f0f0f5;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .message.assistant {
    background: #f8f8fa;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    color: #333;
  }
  .message.system {
    background: #fffbe6;
    align-self: center;
    font-size: 12px;
    color: #8a7a2a;
    border: 1px solid #f0e68c;
  }
  .message code {
    background: #e8e8ec;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .message pre {
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 13px;
    margin: 8px 0;
  }
  .loading { opacity: 0.6; }
  .loading::after { content: " ▊"; animation: blink 0.8s infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .input-area {
    border-top: 1px solid #e8e8ec;
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    background: #fff;
    flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    transition: border-color 0.2s;
  }
  .input-area textarea:focus { border-color: #888; }
  .input-area button {
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .input-area button:hover { background: #333; }
  .input-area button:disabled { background: #ccc; cursor: not-allowed; }

  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: #aaa;
    gap: 8px;
  }
  .welcome h2 { font-size: 20px; color: #666; font-weight: 500; }
  .welcome p { font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <span class="status-dot"></span>
  <h1>Dong AI Company</h1>
  <span class="model" id="modelLabel">模型加载中...</span>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <h2>🏢 Dong AI</h2>
    <p>下达指令，AI 公司即刻运作</p>
  </div>
</div>

<div class="input-area">
  <textarea id="inputBox" rows="1" placeholder="给 CEO 下达指令..." onkeydown="onKeyDown(event)"></textarea>
  <button id="sendBtn" onclick="send()">发送</button>
</div>

<script>
const API = window.location.origin + '/v1/chat/completions';
let loading = false;

// 加载时检测可用模型
fetch(window.location.origin + '/v1/models')
  .then(r => r.json())
  .then(data => {
    if (data.data && data.data.length > 0) {
      document.getElementById('modelLabel').textContent = data.data[0].id;
    }
  })
  .catch(() => {});

function addMessage(role, content) {
  const w = document.getElementById('welcome');
  if (w) w.remove();
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.textContent = content;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

async function send() {
  if (loading) return;
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '44px';

  addMessage('user', text);
  loading = true;
  document.getElementById('sendBtn').disabled = true;

  const msgDiv = addMessage('assistant', '');
  msgDiv.classList.add('loading');

  try {
    const resp = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: '',
        messages: [{ role: 'user', content: text }],
        stream: true,
        max_tokens: 8192,
      }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      msgDiv.textContent = '❌ ' + (err.detail || '请求失败');
      msgDiv.classList.remove('loading');
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const parsed = JSON.parse(data);
            const content = parsed.choices?.[0]?.delta?.content || '';
            if (content) {
              fullText += content;
              msgDiv.textContent = fullText;
            }
          } catch (e) {}
        }
      }
    }
  } catch (e) {
    msgDiv.textContent = '❌ 网络错误: ' + e.message;
  }

  msgDiv.classList.remove('loading');
  loading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}
</script>
</body>
</html>
